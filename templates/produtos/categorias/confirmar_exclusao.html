{% extends 'base.html' %}
{% block title %}Excluir Categoria{% endblock %}
{% block content %}
<div class="card p-4" style="max-width: 400px; margin: auto;">
    <h5 class="fw-bold mb-3">Excluir categoria</h5>
    <p>Tem certeza que deseja excluir <strong>{{ categoria.nome }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100">Confirmar exclusão</button>
        <a href="{% url 'listar_categorias' %}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
    </form>
</div>
{% endblock %}

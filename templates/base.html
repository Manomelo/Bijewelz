<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #fdf6f0; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; letter-spacing: 1px; }
        .navbar { background-color: #1a1a2e !important; }
        .btn-primary { background-color: #c9a96e; border-color: #c9a96e; color: #1a1a2e; font-weight: 600; }
        .btn-primary:hover { background-color: #b8935a; border-color: #b8935a; color: #1a1a2e; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .card-img-top { border-radius: 12px 12px 0 0; object-fit: cover; height: 220px; background: #e8ddd0; }
        footer { background-color: #1a1a2e; color: #aaa; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark mb-0">

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

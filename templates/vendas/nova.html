{% extends 'base.html' %}
{% block title %}Nova Venda{% endblock %}
{% block content %}
<h2>Nova Venda</h2>

{% if erros %}
<div class="alert alert-danger">
    <ul class="mb-0">
        {% for erro in erros %}<li>{{ erro }}</li>{% endfor %}
    </ul>
</div>
{% endif %}

<form method="post" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Cliente (opcional)</label>
        <select name="cliente" class="form-select">
            <option value="">— Sem cliente —</option>
            {% for c in clientes %}
            <option value="{{ c.pk }}">{{ c.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <h5>Itens</h5>
    <div id="itens">
        <div class="row mb-2 item-row">
            <div class="col-6">
                <select name="produto" class="form-select">
                    <option value="">— Selecione o produto —</option>
                    {% for p in produtos %}
                    <option value="{{ p.pk }}">{{ p.nome }} (estoque: {{ p.qtd_estoque }}) — R$ {{ p.preco }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-4">
                <input type="number" name="quantidade" class="form-control" placeholder="Quantidade" min="1">
            </div>
            <div class="col-2">
                <button type="button" class="btn btn-danger" onclick="removerItem(this)">X</button>
            </div>
        </div>
    </div>

    <button type="button" class="btn btn-secondary mb-3" onclick="adicionarItem()">+ Adicionar Item</button>

    <br>
    <button type="submit" class="btn btn-success">Registrar Venda</button>
    <a href="{% url 'listar_vendas' %}" class="btn btn-secondary">Cancelar</a>
</form>

<script>
function adicionarItem() {
    const container = document.getElementById('itens');
    const primeira = container.querySelector('.item-row');
    const nova = primeira.cloneNode(true);
    nova.querySelectorAll('select, input').forEach(el => el.value = '');
    container.appendChild(nova);
}
function removerItem(btn) {
    const itens = document.querySelectorAll('.item-row');
    if (itens.length > 1) btn.closest('.item-row').remove();
}
</script>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Criar conta — Bijewelz{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="fw-bold mb-1 text-center">Criar conta</h4>
            <p class="text-muted text-center mb-4">Cadastre-se para começar a comprar</p>

            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}"
                           name="{{ field.html_name }}"
                           class="form-control {% if field.errors %}is-invalid{% endif %}"
                           placeholder="{{ field.label }}">
                    {% for error in field.errors %}
                    <div class="invalid-feedback">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 mb-3">Criar conta</button>
            </form>

            <p class="text-center text-muted mb-0">
                Já tem conta?
                <a href="/loja/conta/login/" class="text-warning fw-semibold">Entrar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

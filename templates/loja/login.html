{% extends 'base.html' %}
{% block title %}Entrar — Bijewelz{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="fw-bold mb-1 text-center">Entrar</h4>
            <p class="text-muted text-center mb-4">Acesse sua conta para continuar</p>

            {% if form.errors %}
            <div class="alert alert-danger">Usuário ou senha inválidos.</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Seu usuário" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="Sua senha">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
            </form>

            <p class="text-center text-muted mb-0">
                Não tem conta?
                <a href="/loja/conta/registro/" class="text-warning fw-semibold">Cadastre-se</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
